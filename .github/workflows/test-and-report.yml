name: Tests & QA Reporting

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      # ── Unit Tests with Coverage ──
      - name: Run tests with coverage
        run: npm test

      - name: Run tests with JUnit reporter
        run: npx mocha test --recursive --timeout 30000 --reporter mocha-junit-reporter --reporter-options mochaFile=test-results/unit-junit.xml
        if: always()

      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          name: unit-tests
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.node == 20 }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results/unit-junit.xml
          flags: unit
          name: unit-test-results
          fail_ci_if_error: false

      # ── Test Inventory & Coverage Summary ──
      - name: Generate test inventory summary
        if: always() && matrix.node == 20
        run: |
          REPO_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          UNIT_COUNT=$(find test -name "*.test.js" ! -name "setup.test.js" | wc -l | tr -d ' ')
          INTEGRATION_COUNT=0
          TOTAL=$((UNIT_COUNT + INTEGRATION_COUNT))

          LINE_COV="N/A"
          BRANCH_COV="N/A"
          FUNC_COV="N/A"

          if [ -f coverage/lcov.info ]; then
            LF=$(grep "^LF:" coverage/lcov.info | awk -F: '{s+=$2} END {print s+0}')
            LH=$(grep "^LH:" coverage/lcov.info | awk -F: '{s+=$2} END {print s+0}')
            BRF=$(grep "^BRF:" coverage/lcov.info | awk -F: '{s+=$2} END {print s+0}')
            BRH=$(grep "^BRH:" coverage/lcov.info | awk -F: '{s+=$2} END {print s+0}')
            FNF=$(grep "^FNF:" coverage/lcov.info | awk -F: '{s+=$2} END {print s+0}')
            FNH=$(grep "^FNH:" coverage/lcov.info | awk -F: '{s+=$2} END {print s+0}')

            if [ "$LF" -gt 0 ]; then LINE_COV=$(awk "BEGIN {printf \"%.0f%%\", ($LH/$LF)*100}"); fi
            if [ "$BRF" -gt 0 ]; then BRANCH_COV=$(awk "BEGIN {printf \"%.0f%%\", ($BRH/$BRF)*100}"); fi
            if [ "$FNF" -gt 0 ]; then FUNC_COV=$(awk "BEGIN {printf \"%.0f%%\", ($FNH/$FNF)*100}"); fi
          fi

          {
            echo "## 📊 Test Inventory & Coverage — ${REPO_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Repository | ${REPO_NAME} |"
            echo "| Version | ${VERSION} |"
            echo "| Unit Test Files | ${UNIT_COUNT} |"
            echo "| Integration Test Files | ${INTEGRATION_COUNT} |"
            echo "| Total Test Files | ${TOTAL} |"
            echo "| Line Coverage | ${LINE_COV} |"
            echo "| Branch Coverage | ${BRANCH_COV} |"
            echo "| Function Coverage | ${FUNC_COV} |"
            echo ""
            echo "### Unit Tests"
          } >> $GITHUB_STEP_SUMMARY

          find test -name "*.test.js" ! -name "setup.test.js" | sort | while read -r f; do
            echo "- ${f}" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Job summary generated at run-time*" >> $GITHUB_STEP_SUMMARY
